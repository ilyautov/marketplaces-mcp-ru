  method: GET
  host: content-api.wildberries.ru
  path: /content/v2/object/all
  scope: content
  safety: read
  pagination: offset
  summary: List subject categories with IDs (for creating cards).
  params:
    query: name, limit<=1000, offset, parentID, locale
  doc: https://dev.wildberries.ru/en/openapi/work-with-products
  keywords:
  - категории
  - предметы
  items_path: data
- operation_id: wb_content_charcs
  section: content
