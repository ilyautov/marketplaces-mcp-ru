default_host: content-api.wildberries.ru
endpoints:
- operation_id: wb_ping_content
  section: system
  method: GET
  host: content-api.wildberries.ru
  path: /ping
  scope: content
  safety: read
  summary: Health check for the Content host; also validates the token works.
  doc: https://dev.wildberries.ru/en/openapi/api-information
  pagination: none
- operation_id: wb_content_cards_list
  section: content
  method: POST
  host: content-api.wildberries.ru
  path: /content/v2/get/cards/list
  scope: content
  safety: read
  pagination: cursor
  rate_limit: 100 req/min
  summary: List created product cards (nomenclatures). Cursor by updatedAt+nmID.
  params:
    body: '{settings:{cursor:{limit:100}, filter:{withPhoto:-1}}}'
  doc: https://dev.wildberries.ru/en/openapi/work-with-products
  keywords:
  - карточки
  - товары
  - номенклатура
  items_path: cards
- operation_id: wb_content_categories
