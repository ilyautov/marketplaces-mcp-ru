- operation_id: ozon_product_list
  section: products
  method: POST
  host: api-seller.ozon.ru
  path: /v3/product/list
  scope: seller
  safety: read
  pagination: last_id
  summary: Paginated product list. Filter by offer_id/product_id/visibility.
  params:
    body: '{filter:{visibility:''ALL''}, limit, last_id}'
  doc: https://docs.ozon.ru/api/seller/
