default_host: api-seller.ozon.ru
endpoints:
- operation_id: ozon_product_list
  section: products
  method: POST
  host: api-seller.ozon.ru
  path: /v3/product/list
  scope: seller
  safety: read
  pagination: last_id
  summary: Paginated product list. Filter by offer_id/product_id/visibility.
  params:
    body: '{filter:{visibility:''ALL''}, limit, last_id}'
  doc: https://docs.ozon.ru/api/seller/
  keywords:
  - товары
  - список товаров
  - номенклатура
  items_path: result.items
- operation_id: ozon_product_info_list
  section: products
  method: POST
  host: api-seller.ozon.ru
  path: /v3/product/info/list
  scope: seller
  safety: read
  summary: Product details for a set of identifiers (offer_id/product_id/sku).
  params:
    body: '{offer_id:[], product_id:[], sku:[]}'
  doc: https://docs.ozon.ru/api/seller/
  pagination: none
  items_path: items
- operation_id: ozon_product_attributes
  section: products
